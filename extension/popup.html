<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meeting Capture</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div class="popup-header__brand">
          <img class="popup-header__logo" src="./logo.png" alt="" />
          <span class="popup-header__title">Meeting Capture</span>
        </div>
        <md-icon-button id="open-options" aria-label="Settings">
          <span class="material-symbols-outlined">settings</span>
        </md-icon-button>
      </header>

      <md-divider></md-divider>

      <section class="popup-body">
        <div id="meet-tabs-container"></div>

        <div id="empty-state" class="popup-empty" hidden>
          <span class="material-symbols-outlined popup-empty__icon">videocam_off</span>
          <span class="popup-empty__text">No Meet sessions</span>
          <md-filled-tonal-button id="new-meet" class="popup-empty__btn">
            <span class="material-symbols-outlined" slot="icon">add</span>
            New Meet
          </md-filled-tonal-button>
        </div>

        <p id="err" class="popup-error" hidden></p>
      </section>

      <md-divider></md-divider>

      <footer class="popup-footer">
        <div class="popup-footer__row">
          <span id="svc-dot" class="popup-footer__dot"></span>
          <span id="svc-label" class="popup-footer__label">Checking service…</span>
        </div>
        <div class="popup-footer__row">
          <span id="mic-dot" class="popup-footer__dot"></span>
          <span id="mic-label" class="popup-footer__label">Checking microphone…</span>
        </div>
        <button id="open-whisper-test" class="popup-footer__test-link" type="button">
          Open Whisper voice test
        </button>
      </footer>
    </main>
    <script type="module" src="./src/popup/main.ts"></script>
  </body>
</html>
