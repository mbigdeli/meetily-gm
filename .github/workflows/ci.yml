name: CI

# Quality gate — runs on every PR and push to main.
# The existing build-*.yml / release.yml workflows are the release path and
# stay manual (workflow_dispatch); this file is the only automated gate.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt · clippy · test)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
      # Tauri's build script requires the sidecar binaries (externalBin) to
      # exist. The llama-helper sidecar isn't built in the test gate (heavy,
      # GPU deps) and unit tests never execute it — stub the file so the build
      # script's existence check passes. (build.rs auto-downloads ffmpeg.)
      - name: Stub llama-helper sidecar
        shell: bash
        run: |
          mkdir -p binaries
          : > binaries/llama-helper-x86_64-pc-windows-msvc.exe
      # Hard gate: tests must pass.
      - run: cargo test --lib
      # Advisory until a formatting + warnings cleanup pass (the existing
      # codebase is not rustfmt-clean and has ~15 legacy clippy warnings).
      # Flip continue-on-error off once clean. New code should still be tidy;
      # clippy.toml enforces per-function size/complexity.
      - run: cargo fmt --all --check
        continue-on-error: true
      - run: cargo clippy --lib -- -D warnings
        continue-on-error: true

  extension:
    name: Extension (typecheck · vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Extension e2e: build the unpacked extension, then load it in Playwright.
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e

  frontend:
    name: Frontend (typecheck · lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      # --no-frozen-lockfile: the package.json `pnpm.overrides` aren't reflected
      # in the lockfile (pnpm 9 no longer reads that field), so a frozen install
      # refuses. TODO: move overrides to pnpm-workspace.yaml + regenerate the
      # lockfile, then restore --frozen-lockfile.
      - run: pnpm install --no-frozen-lockfile
      # Hard gate: type safety.
      - run: pnpm run typecheck
      # TODO: `next lint` isn't configured in this project yet (interactive
      # setup prompt). Add an ESLint config (with max-lines) then enable here.

  conventions:
    name: Conventions (commits · file length)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # New/changed source files must stay small (see scripts/check-file-length.mjs).
      - name: File length gate
        run: node scripts/check-file-length.mjs
      # Conventional Commits on PR commits (non-blocking on push to main).
      - name: Commit message lint
        if: github.event_name == 'pull_request'
        run: >
          npx --yes --package @commitlint/cli --package @commitlint/config-conventional
          commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.sha }}
