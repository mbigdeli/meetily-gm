name: CI

# Quality gate — runs on every PR and push to main.
# The existing build-*.yml / release.yml workflows are the release path and
# stay manual (workflow_dispatch); this file is the only automated gate.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt · clippy · test)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
      - run: cargo fmt --all --check
      - run: cargo clippy --lib --all-features -- -D warnings
      - run: cargo test --lib

  extension:
    name: Extension (typecheck · vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  frontend:
    name: Frontend (typecheck · lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint

  conventions:
    name: Conventions (commits · file length)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # New/changed source files must stay small (see scripts/check-file-length.mjs).
      - name: File length gate
        run: node scripts/check-file-length.mjs
      # Conventional Commits on PR commits (non-blocking on push to main).
      - name: Commit message lint
        if: github.event_name == 'pull_request'
        run: >
          npx --yes --package @commitlint/cli --package @commitlint/config-conventional
          commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.sha }}
